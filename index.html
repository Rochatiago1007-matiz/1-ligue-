// =============================================================
// MODELO POISSON BIVARIADO
// =============================================================
function poissonLambdas({ homeAvgFor, homeAvgAgainst, awayAvgFor, awayAvgAgainst, leagueAvgGoals, homeAdv = 0.30 }) {
  const homeAttack = homeAvgFor / leagueAvgGoals;
  const homeDef = homeAvgAgainst / leagueAvgGoals;
  const awayAttack = awayAvgFor / leagueAvgGoals;
  const awayDef = awayAvgAgainst / leagueAvgGoals;
  const lambdaHome = homeAttack * awayDef * leagueAvgGoals + homeAdv;
  const lambdaAway = awayAttack * homeDef * leagueAvgGoals;
  return {
    lambdaHome: Math.max(0.1, lambdaHome),
    lambdaAway: Math.max(0.1, lambdaAway)
  };
}

function poissonPMF(lambda, k) {
  if (k < 0) return 0;
  let log = -lambda + k * Math.log(lambda);
  for (let i = 1; i <= k; i++) log -= Math.log(i);
  return Math.exp(log);
}

function footballOutcomeProbs(lambdaHome, lambdaAway, maxGoals = 8, overLine = 2.5) {
  let pHome = 0, pDraw = 0, pAway = 0, pOver = 0, pUnder = 0;
  const matrix = [];
  for (let h = 0; h <= maxGoals; h++) {
    const row = [];
    for (let a = 0; a <= maxGoals; a++) {
      const p = poissonPMF(lambdaHome, h) * poissonPMF(lambdaAway, a);
      row.push(p);
      if (h > a) pHome += p;
      else if (h === a) pDraw += p;
      else pAway += p;
      const total = h + a;
      if (total > overLine) pOver += p;
      else pUnder += p;
    }
    matrix.push(row);
  }
  const total = pHome + pDraw + pAway;
  return {
    pHome: pHome / total,
    pDraw: pDraw / total,
    pAway: pAway / total,
    pOver: pOver / (pOver + pUnder),
    pUnder: pUnder / (pOver + pUnder),
    matrix,
    expectedGoals: lambdaHome + lambdaAway,
    lambdaHome, lambdaAway
  };
}

// Top 3 most likely scores
function topScores(matrix, n = 3) {
  const flat = [];
  for (let h = 0; h < matrix.length; h++) {
    for (let a = 0; a < matrix[h].length; a++) {
      flat.push({ home: h, away: a, prob: matrix[h][a] });
    }
  }
  return flat.sort((a, b) => b.prob - a.prob).slice(0, n);
}

const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchViaCORSProxy(url, timeoutMs = 8000) {
  for (const proxy of CORS_PROXIES) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      const r = await fetch(proxy(url), { signal: ctrl.signal });
      clearTimeout(t);
      if (r.ok) return await r.text();
    } catch {}
  }
  throw new Error("Todos os proxies CORS falharam");
}

function parseRSS(xml) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, "text/xml");
    const items = Array.from(doc.querySelectorAll("item")).slice(0, 25);
    return items.map(item => {
      const get = sel => {
        const el = item.querySelector(sel);
        return el ? el.textContent.trim() : "";
      };
      const desc = get("description").replace(/<[^>]+>/g, "").slice(0, 280);
      return {
        title: get("title"),
        description: desc,
        link: get("link"),
        pubDate: get("pubDate"),
        ts: new Date(get("pubDate") || Date.now()).getTime()
      };
    });
  } catch { return []; }
}

async function fetchAllNews() {
  const all = [];
  // Fetch em paralelo (mais rápido)
  await Promise.all(NEWS_FEEDS.map(async feed => {
    try {
      const xml = await fetchViaCORSProxy(feed.url);
      const items = parseRSS(xml);
      items.forEach(item => all.push({ ...item, source: feed.name, sourceColor: feed.color }));
    } catch (err) {
      console.warn(`[news] ${feed.name}:`, err.message);
    }
  }));
  return all.sort((a, b) => b.ts - a.ts).slice(0, 50);
}

// Filtra notícias relevantes para 2 equipas
function filterNewsForGame(news, homeTeam, awayTeam, homeShort, awayShort) {
  if (!news || !news.length) return [];

  const buildKw = (full, short) => {
    const set = new Set();
    [full, short].filter(Boolean).forEach(name => {
      const lower = name.toLowerCase();
      set.add(lower);
      // Última palavra (Liverpool, Chelsea, City, United, etc) — mas só se >= 4 chars
      const parts = lower.split(/\s+/).filter(w => w.length >= 4);
      parts.forEach(p => set.add(p));
    });
    return [...set];
  };

  const homeKw = buildKw(homeTeam, homeShort);
  const awayKw = buildKw(awayTeam, awayShort);

  return news.filter(n => {
    const text = `${n.title} ${n.description}`.toLowerCase();
    return homeKw.some(k => text.includes(k)) || awayKw.some(k => text.includes(k));
  });
}

const CLAUDE_MODEL = "claude-sonnet-4-20250514";

const SYSTEM_PROMPT = `És um analista de futebol especializado em Premier League. Recebes:
- Probabilidades calculadas por modelo Poisson (golos esperados, P de vitória/empate/derrota, P de over 2.5)
- Classificação atual das duas equipas
- Forma recente (últimos 5 jogos cada)
- Head-to-head últimos confrontos
- Notícias relevantes (lesões, suspensões, contexto recente)

A tua função é dar UM PICK FINAL com confiança calibrada, ajustando o modelo com contexto qualitativo.

PRINCÍPIOS DE AJUSTE:
- Lesões de jogadores-chave → reduz prob da equipa afetada
- Forma quente (4+ vitórias seguidas) → +5-10% confiança
- Forma fria (4+ jogos sem ganhar) → -5-10% confiança
- Equipa em crise / treinador despedido → red flag, reduz confiança
- Derby/clássico → maior imprevisibilidade, baixa confiança
- Equipa lutando relegação em casa contra top-6 → frequentemente empate
- Top-6 em casa contra bottom-6 → over 2.5 mais provável
- Se confiança final < 55%, marca como "TOSS-UP"
- Em caso de dúvida entre vitória clara e empate, considera o draw mais seriamente do que o modelo

NÃO recomendas apostas. Só dás opinião sobre quem vai ganhar e quantos golos.

OUTPUT — APENAS JSON, SEM MARKDOWN:
{
  "winner_pick": "HOME" | "AWAY" | "DRAW" | "TOSS_UP",
  "winner_confidence": <number 0-1>,
  "total_pick": "OVER" | "UNDER" | "TOSS_UP",
  "total_confidence": <number 0-1>,
  "predicted_score": "<X-Y>",
  "key_factors": [<string>],
  "concerns": [<string>],
  "reasoning": "<2-3 frases explicando o pick>"
}`;

function safeParseJSON(text) {
  const cleaned = text.replace(/```json\s*/gi, "").replace(/```/g, "").trim();
  const start = cleaned.indexOf("{");
  const end = cleaned.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("JSON não encontrado");
  return JSON.parse(cleaned.slice(start, end + 1));
}

async function callClaude(systemPrompt, userMsg, maxTokens = 1500) {
  refreshKeys();
  if (!KEYS.anthropic) throw new Error("ANTHROPIC_API_KEY não configurada (vai a ⚙)");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": KEYS.anthropic,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: userMsg }]
    })
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Claude ${resp.status}: ${text.slice(0, 200)}`);
  }
  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  return safeParseJSON(text);
}

${h2h.length ? h2h.slice(0, 5).map(m => `  ${m.homeTeam} ${m.homeScore != null ? m.homeScore : '?'}-${m.awayScore != null ? m.awayScore : '?'} ${m.awayTeam}`).join('\n') : '  sem dados'}

═══ NOTÍCIAS RECENTES (${news.length} relevantes) ═══

Considera o contexto qualitativo das notícias (especialmente lesões e suspensões) para ajustar as probabilidades base.
Sê honesto: se há muita incerteza, marca TOSS-UP.`;

  return await callClaude(SYSTEM_PROMPT, userMsg, 1500);
}

// Linha temporal: rolling accuracy ao longo dos jogos
function AccuracyTimeline({ picks, type = 'winner' }) {
  // type: 'winner' ou 'total'
  const settled = picks
    .filter(p => p.result !== 'pending')
    .filter(p => type === 'winner' ? p.winnerCorrect != null : p.totalCorrect != null)
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

  if (settled.length < 2) {
    return e('div', { style: { padding: 30, textAlign: 'center', color: T.textMuted, fontSize: 11 } },
      `Precisa de pelo menos 2 jogos resolvidos para mostrar evolução (tens ${settled.length})`
    );
  }

  // Calcular accuracy cumulativa (acertos até agora / total até agora)
  let correct = 0;
  const points = settled.map((p, i) => {
    const isCorrect = type === 'winner' ? p.winnerCorrect : p.totalCorrect;
    if (isCorrect) correct++;
    return {
      i: i + 1,
      acc: correct / (i + 1),
      date: p.utcDate,
      gameLabel: `${p.homeTeamShort || p.homeTeam} vs ${p.awayTeamShort || p.awayTeam}`,
      hit: isCorrect
    };
  });

  // Layout
  const W = 600, H = 200;
  const padL = 40, padR = 20, padT = 20, padB = 30;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const xScale = (i) => padL + ((i - 1) / Math.max(1, points.length - 1)) * innerW;
  const yScale = (acc) => padT + (1 - acc) * innerH;

  // Path da linha
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.i).toFixed(1)},${yScale(p.acc).toFixed(1)}`).join(' ');

  // Linhas horizontais de referência
  const yRefs = [0.25, 0.5, 0.75, 1];

  // Cor da linha consoante accuracy final
  const finalAcc = points[points.length - 1].acc;
  const lineColor = finalAcc >= 0.55 ? T.win : finalAcc >= 0.45 ? T.warn : T.loss;

  return e('div', { style: { width: '100%', overflowX: 'auto' } },
    e('svg', {
      viewBox: `0 0 ${W} ${H}`,
      style: { width: '100%', minWidth: 400, height: 'auto', display: 'block' }
    },
      // Linha 50% (barreira de aleatório)
      e('line', {
        x1: padL, y1: yScale(0.5),
        x2: W - padR, y2: yScale(0.5),
        stroke: T.warn, strokeWidth: 1, strokeDasharray: '4,4', opacity: 0.5
      }),
      e('text', {
        x: W - padR - 4, y: yScale(0.5) - 4,
        fill: T.warn, fontSize: 8, textAnchor: 'end', opacity: 0.8
      }, '50% (aleatório)'),

      // Eixos Y (labels)
      ...yRefs.map(y => e('g', { key: y },
        e('line', {
          x1: padL, y1: yScale(y), x2: W - padR, y2: yScale(y),
          stroke: T.border, strokeWidth: 0.5, opacity: 0.4
        }),
        e('text', {
          x: padL - 6, y: yScale(y) + 3,
          fill: T.textMuted, fontSize: 9, textAnchor: 'end', fontFamily: 'monospace'
        }, `${(y * 100).toFixed(0)}%`)
      )),

      // Eixo X label
      e('text', {
        x: padL, y: H - 8,
        fill: T.textMuted, fontSize: 9, fontFamily: 'monospace'
      }, '1'),
      e('text', {
        x: W - padR, y: H - 8,
        fill: T.textMuted, fontSize: 9, textAnchor: 'end', fontFamily: 'monospace'
      }, `${points.length}`),
      e('text', {
        x: W / 2, y: H - 8,
        fill: T.textDim, fontSize: 9, textAnchor: 'middle', letterSpacing: '0.15em'
      }, 'JOGOS →'),

      // Área sob a linha
      e('path', {
        d: `${linePath} L${xScale(points[points.length-1].i).toFixed(1)},${yScale(0).toFixed(1)} L${padL},${yScale(0).toFixed(1)} Z`,
        fill: lineColor,
        opacity: 0.1
      }),

      // Linha
      e('path', {
        d: linePath,
        fill: 'none',
        stroke: lineColor,
        strokeWidth: 2,
        strokeLinecap: 'round',
        strokeLinejoin: 'round'
      }),

      // Pontos
      ...points.map((p, i) => e('circle', {
        key: i,
        cx: xScale(p.i),
        cy: yScale(p.acc),
        r: 3,
        fill: p.hit ? T.win : T.loss,
        stroke: T.bg,
        strokeWidth: 1
      })),

      // Último ponto destacado
      e('circle', {
        cx: xScale(points[points.length - 1].i),
        cy: yScale(points[points.length - 1].acc),
        r: 5,
        fill: lineColor,
        stroke: T.bgPanel,
        strokeWidth: 2
      }),
      e('text', {
        x: xScale(points[points.length - 1].i) - 8,
        y: yScale(points[points.length - 1].acc) - 10,
        fill: lineColor, fontSize: 11, fontWeight: 700, textAnchor: 'end', fontFamily: 'monospace'
      }, fmt.pct(points[points.length - 1].acc))
    )
  );
}

// Donut chart de distribuição
function DistributionDonut({ counts }) {
  // counts: { correct, partial, wrong, tossup, pending }
  const total = (counts.correct || 0) + (counts.partial || 0) + (counts.wrong || 0) + (counts.tossup || 0) + (counts.pending || 0);
  if (total === 0) {
    return e('div', { style: { padding: 20, textAlign: 'center', color: T.textMuted, fontSize: 11 } }, 'Sem dados');
  }

  const segments = [
    { key: 'correct', label: 'Acertos', value: counts.correct || 0, color: T.win },
    { key: 'partial', label: 'Parciais', value: counts.partial || 0, color: T.warn },
    { key: 'wrong', label: 'Falhas', value: counts.wrong || 0, color: T.loss },
    { key: 'tossup', label: 'Toss-ups', value: counts.tossup || 0, color: T.textMuted },
    { key: 'pending', label: 'Pendentes', value: counts.pending || 0, color: T.border },
  ].filter(s => s.value > 0);

  // SVG donut
  const size = 140;
  const cx = size / 2, cy = size / 2;
  const r = 50, innerR = 32;

  let cumAngle = -Math.PI / 2; // começar no topo
  const arcs = segments.map(s => {
    const angle = (s.value / total) * Math.PI * 2;
    const startAngle = cumAngle;
    const endAngle = cumAngle + angle;
    cumAngle = endAngle;

    const largeArc = angle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const xi1 = cx + innerR * Math.cos(endAngle);
    const yi1 = cy + innerR * Math.sin(endAngle);
    const xi2 = cx + innerR * Math.cos(startAngle);
    const yi2 = cy + innerR * Math.sin(startAngle);

    const path = `M${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} L${xi1},${yi1} A${innerR},${innerR} 0 ${largeArc} 0 ${xi2},${yi2} Z`;
    return { ...s, path };
  });

  const accSettled = (counts.correct || 0) + (counts.partial || 0) + (counts.wrong || 0);
  const correctPct = accSettled > 0 ? ((counts.correct || 0) / accSettled) : 0;

  return e('div', { style: { display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap', padding: '8px 0' } },
    // SVG donut
    e('div', { style: { position: 'relative', flexShrink: 0 } },
      e('svg', { viewBox: `0 0 ${size} ${size}`, style: { width: size, height: size } },
        ...arcs.map((a, i) => e('path', {
          key: i,
          d: a.path,
          fill: a.color,
          stroke: T.bgPanel,
          strokeWidth: 1
        }))
      ),
      // Center text
      e('div', {
        style: {
          position: 'absolute', inset: 0,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          pointerEvents: 'none'
        }
      },
        e('div', { style: { fontSize: 22, fontWeight: 800, color: T.textPrimary, lineHeight: 1 } }, total),
        e('div', { style: { fontSize: 8, color: T.textMuted, letterSpacing: '0.15em', marginTop: 4 } }, 'TOTAL')
      )
    ),
    // Legenda
    e('div', { style: { display: 'flex', flexDirection: 'column', gap: 6, flex: 1, minWidth: 160 } },
      ...segments.map(s => e('div', { key: s.key, style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 11 } },
        e('div', { style: { width: 12, height: 12, background: s.color, borderRadius: 2, flexShrink: 0 } }),
        e('span', { style: { color: T.textSecondary, flex: 1 } }, s.label),
        e('span', { style: { color: T.textPrimary, fontWeight: 700, fontFamily: 'monospace' } }, s.value),
        e('span', { style: { color: T.textMuted, fontSize: 9, fontFamily: 'monospace' } }, `${((s.value / total) * 100).toFixed(0)}%`)
      ))
    )
  );
}

function GameCard({ game, allNews, standings, leagueAvgGoals, onAnalyzed, savedPick }) {
  const [analyzing, setAnalyzing] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const [analysis, setAnalysis] = useState(savedPick?.analysis || null);
  const [error, setError] = useState(null);

  const homeStanding = useMemo(() =>
    standings?.find(s => s.teamId === game.homeId), [standings, game]);
  const awayStanding = useMemo(() =>
    standings?.find(s => s.teamId === game.awayId), [standings, game]);

  const analyze = async () => {
    setAnalyzing(true);
    setError(null);
    setExpanded(true);
    try {
      if (!homeStanding || !awayStanding) {
        throw new Error("Standings em falta. Recarrega a página.");
      }

      // 1. Modelo Poisson
      const lambdas = poissonLambdas({
        homeAvgFor: homeStanding.avgFor,
        homeAvgAgainst: homeStanding.avgAgainst,
        awayAvgFor: awayStanding.avgFor,
        awayAvgAgainst: awayStanding.avgAgainst,
        leagueAvgGoals,
        homeAdv: COMP.homeAdvantage,
      });
      const modelProbs = footballOutcomeProbs(lambdas.lambdaHome, lambdas.lambdaAway, 8, COMP.overLine);
      const topScoresList = topScores(modelProbs.matrix, 3);

      // 2. Carregar contexto em paralelo
      let recentForm = { home: [], away: [] };
      let h2h = [];
      try {
        [recentForm.home, recentForm.away, h2h] = await Promise.all([
          fdTeamRecent(game.homeId, 5).catch(() => []),
          fdTeamRecent(game.awayId, 5).catch(() => []),
          fdHeadToHead(game.id, 5).catch(() => []),
        ]);
      } catch {}

      // 3. Filtrar notícias
      const relevantNews = filterNewsForGame(
        allNews, game.homeTeam, game.awayTeam,
        game.homeTeamShort, game.awayTeamShort
      ).slice(0, 10);

      // 4. Pedir pick à IA
      let aiPick = null;
      if (KEYS.anthropic) {
        try {
          aiPick = await getAIPick({
            gameInfo: game,
            modelProbs,
            standings: { home: homeStanding, away: awayStanding },
            recentForm,
            h2h,
            news: relevantNews,
          });
        } catch (err) {
          aiPick = { error: err.message };
        }
      }

      const result = {
        modelProbs,
        topScores: topScoresList,
        recentForm,
        h2h,
        relevantNews,
        aiPick,
        ts: new Date().toISOString(),
      };
      setAnalysis(result);
      onAnalyzed && onAnalyzed(game, result);
    } catch (err) {
      setError(err.message);
    } finally {
      setAnalyzing(false);
    }
  };

  const pick = analysis?.aiPick;
  const hasError = pick?.error;
  const winnerFromAI = pick?.winner_pick;
  const winnerLabel = winnerFromAI === 'HOME' ? (game.homeTeamShort || game.homeTeam) :
    winnerFromAI === 'AWAY' ? (game.awayTeamShort || game.awayTeam) :
    winnerFromAI === 'DRAW' ? 'EMPATE' :
    winnerFromAI === 'TOSS_UP' ? 'TOSS-UP' : null;
  const totalPick = pick?.total_pick;

  return e('div', {
    style: {
      background: T.bgPanel,
      border: `1px solid ${analysis ? T.primary + '60' : T.border}`,
      borderRadius: 8,
      overflow: 'hidden',
      transition: 'all .2s',
      animation: 'fadeUp .3s ease'
    }
  },
    // Header clicável
    e('div', {
      onClick: () => setExpanded(!expanded),
      style: { padding: 16, cursor: 'pointer', borderBottom: expanded ? `1px solid ${T.border}` : 'none' }
    },
      e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, flexWrap: 'wrap', gap: 8 } },
        e('div', { style: { fontSize: 9, letterSpacing: '0.2em', color: T.textMuted, fontWeight: 700 } },
          fmt.dateTime(game.utcDate),
          game.matchday && e('span', { style: { color: T.secondaryLight, marginLeft: 8 } }, `J${game.matchday}`)
        ),
        analysis && e(Badge, { color: 'primary', size: 'sm' }, '✓ ANALISADO')
      ),

      // Equipas com crests
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 } },
        e('div', { style: { flex: 1, display: 'flex', alignItems: 'center', gap: 10 } },
          game.homeCrest && e('img', { src: game.homeCrest, alt: '', style: { width: 32, height: 32, objectFit: 'contain' }, onError: ev => ev.target.style.display = 'none' }),

// PÁGINA PRINCIPAL: PICKS
// =============================================================
function PicksPage() {
  const [games, setGames] = useState([]);
  const [standings, setStandings] = useState([]);
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newsLoading, setNewsLoading] = useState(false);
  const [error, setError] = useState(null);
  const [warnings, setWarnings] = useState([]);
  const [dateRange, setDateRange] = useState('week'); // today | tomorrow | week
  const [newsLastLoad, setNewsLastLoad] = useState(null);

  const leagueAvgGoals = useMemo(() => {
    if (!standings || standings.length === 0) return 1.4;
    const totalGoals = standings.reduce((s, t) => s + t.goalsFor, 0);
    const totalMatches = standings.reduce((s, t) => s + t.played, 0) / 2;
    return totalMatches > 0 ? (totalGoals / totalMatches / 2) : 1.4;
  }, [standings]);

  const loadData = async () => {
    setLoading(true);
    setError(null);
    setWarnings([]);
    const w = [];

    try {
      if (!KEYS.footballdata) {
        throw new Error("FOOTBALL_DATA_KEY não configurada. Vai a ⚙ e adiciona uma chave grátis (regista email em football-data.org).");
      }

      const dateFrom = dateRange === 'today' ? todayISO() :
                       dateRange === 'tomorrow' ? dateOffsetISO(1) : todayISO();
      const dateTo = dateRange === 'today' ? todayISO() :
                     dateRange === 'tomorrow' ? dateOffsetISO(1) : dateOffsetISO(7);

      const [fixtures, standingsData] = await Promise.all([
        fdMatches(dateFrom, dateTo).catch(err => { w.push(`Fixtures: ${err.message}`); return []; }),
        fdStandings().catch(err => { w.push(`Standings: ${err.message}`); return []; }),
      ]);

      setGames(fixtures || []);
      setStandings(standingsData || []);
      if (!fixtures || fixtures.length === 0) {
        w.push(`Sem jogos para ${dateRange === 'today' ? 'hoje' : dateRange === 'tomorrow' ? 'amanhã' : 'esta semana'} na Premier League`);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
      setWarnings(w);
    }
  };

  const loadNewsData = async () => {
    setNewsLoading(true);
    try {
      const items = await fetchAllNews();
      setNews(items);
      setNewsLastLoad(new Date());
    } catch (e) { console.warn(e); }
    setNewsLoading(false);
  };

  // Auto-load ao montar e quando muda range
  useEffect(() => {
    loadData();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dateRange]);

  useEffect(() => {
    loadNewsData();
  }, []);

  const onGameAnalyzed = (game, result) => {
    const allPicks = loadPicks();
    const entry = {
      id: Date.now() + Math.random(),
      gameId: game.id,
      created_at: new Date().toISOString(),
      utcDate: game.utcDate,
      matchday: game.matchday,
      homeTeam: game.homeTeam,
      homeTeamShort: game.homeTeamShort,
      awayTeam: game.awayTeam,
      awayTeamShort: game.awayTeamShort,
      winnerPick: result.aiPick?.winner_pick,
      winnerConfidence: result.aiPick?.winner_confidence,
      totalPick: result.aiPick?.total_pick,
      totalConfidence: result.aiPick?.total_confidence,
      predictedScore: result.aiPick?.predicted_score,
      reasoning: result.aiPick?.reasoning,
      result: 'pending',
    };
    // Substitui se já existe
    const filtered = allPicks.filter(p => p.gameId !== game.id);
    filtered.unshift(entry);
    savePicks(filtered.slice(0, 200));
  };

  // Group games by day
  const gamesByDay = useMemo(() => {
    const groups = {};
    games.forEach(g => {
      const day = g.utcDate.slice(0, 10);
      if (!groups[day]) groups[day] = [];
      groups[day].push(g);
    });
    return Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
  }, [games]);

  return e('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
    // Top header
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 12 } },
      e('div', null,
        e('div', { style: { fontSize: 10, letterSpacing: '0.3em', color: T.primary, fontWeight: 700 } }, '⚽ PREMIER LEAGUE // PICKS'),
        e('div', { style: { fontSize: 24, color: T.textPrimary, fontWeight: 800, marginTop: 4 } }, 'Próximos jogos')
      ),
      e('div', { style: { display: 'flex', gap: 6 } },
        ['today', 'tomorrow', 'week'].map(r => e('button', {
          key: r,
          onClick: () => setDateRange(r),
          style: {
            padding: '6px 12px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700,
            background: dateRange === r ? T.primary + '20' : 'transparent',
            color: dateRange === r ? T.primary : T.textMuted,
            border: `1px solid ${dateRange === r ? T.primary + '70' : T.border}`,
            borderRadius: 4, cursor: 'pointer'
          }
        }, r === 'today' ? 'HOJE' : r === 'tomorrow' ? 'AMANHÃ' : '7 DIAS'))
      )
    ),

    // Status bar
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 } },
      e('div', { style: { fontSize: 10, color: T.textMuted } },
        loading ? '⏳ a carregar...' :
          games.length > 0 ? `${games.length} jogo${games.length === 1 ? '' : 's'} encontrado${games.length === 1 ? '' : 's'}` : 'sem jogos'
      ),
      e('div', { style: { fontSize: 10, color: T.textMuted, display: 'flex', alignItems: 'center', gap: 8 } },
        newsLoading ? e('span', { className: 'spinner' }) : null,
        news.length > 0 && `📰 ${news.length} notícias`,
        newsLastLoad && e('span', null, `· ${newsLastLoad.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}`),
        e(Button, { onClick: () => { loadData(); loadNewsData(); }, variant: 'ghost', size: 'sm' }, '↻')
      )
    ),

    // Warnings
    warnings.length > 0 && e('div', { style: { padding: 10, background: T.warn + '15', borderRadius: 4, border: `1px solid ${T.warn}40` } },
      warnings.map((w, i) => e('div', { key: i, style: { fontSize: 10, color: T.warn, lineHeight: 1.5 } }, '⚠ ' + w))
    ),

    error && e(Card, { accent: T.loss + '60', style: { background: T.loss + '08' } },
      e('div', { style: { fontSize: 9, color: T.loss, fontWeight: 700, letterSpacing: '0.25em', marginBottom: 6 } }, 'ERRO'),
      e('div', { style: { fontSize: 12, color: T.loss } }, error)
    ),

    !KEYS.anthropic && !error && e('div', { style: { padding: 14, background: T.warn + '12', border: `1px solid ${T.warn}40`, borderRadius: 6 } },
      e('div', { style: { fontSize: 11, color: T.warn, fontWeight: 700, marginBottom: 4 } }, '⚠ ANTHROPIC_API_KEY em falta'),
      e('div', { style: { fontSize: 11, color: T.textPrimary } }, 'Sem ela, os jogos mostram apenas o modelo matemático. Configura em ⚙.')
    ),

    // Loading
    loading && e('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
      [1, 2, 3].map(i => e('div', { key: i, style: { height: 100, background: T.bgPanel, borderRadius: 8, animation: 'pulse 1.5s ease-in-out infinite', opacity: 0.5 } }))
    ),

    // Lista de jogos agrupada por dia
    !loading && gamesByDay.length > 0 && gamesByDay.map(([day, gms]) => e('div', { key: day, style: { display: 'flex', flexDirection: 'column', gap: 10 } },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0' } },
        e('div', { style: { fontSize: 10, letterSpacing: '0.3em', color: T.secondaryLight, fontWeight: 700 } }, fmt.dayLabel(day)),
        e('div', { style: { flex: 1, height: 1, background: T.border } }),
        e('div', { style: { fontSize: 9, color: T.textDim } }, `${gms.length} jogo${gms.length === 1 ? '' : 's'}`)
      ),
      gms.map(game => e(GameCard, {
        key: game.id,
        game,
        allNews: news,
        standings,
        leagueAvgGoals,
        onAnalyzed: onGameAnalyzed
      }))
    )),

    // Empty
    !loading && games.length === 0 && !error && e(Card, { padding: 32, style: { textAlign: 'center' } },
      e('div', { style: { fontSize: 36, marginBottom: 12 } }, '⚽'),
      e('div', { style: { fontSize: 13, color: T.textPrimary, fontWeight: 700, marginBottom: 6 } }, `Sem jogos ${dateRange === 'today' ? 'hoje' : dateRange === 'tomorrow' ? 'amanhã' : 'esta semana'}`),
      e('div', { style: { fontSize: 11, color: T.textMuted } }, 'Tenta outro intervalo de datas.')
    )
  );
}

// Determina se o pick acertou ou não, baseado no resultado real
function evaluatePick(pick, finalScore) {
  if (finalScore.homeScore == null || finalScore.awayScore == null) return null;
  const h = finalScore.homeScore;
  const a = finalScore.awayScore;
  const totalGoals = h + a;

  // Vencedor real
  let realWinner;
  if (h > a) realWinner = 'HOME';
  else if (h < a) realWinner = 'AWAY';
  else realWinner = 'DRAW';

  // Avaliar pick do vencedor
  let winnerCorrect = null;
  if (pick.winnerPick === 'TOSS_UP') {
    winnerCorrect = null; // toss-up não conta nem como acerto nem erro
  } else {
    winnerCorrect = pick.winnerPick === realWinner;
  }

  // Avaliar pick do total
  let totalCorrect = null;
  if (pick.totalPick === 'TOSS_UP') {
    totalCorrect = null;
  } else if (pick.totalPick === 'OVER') {
    totalCorrect = totalGoals > 2.5;
  } else if (pick.totalPick === 'UNDER') {
    totalCorrect = totalGoals < 2.5;
  }

  // Avaliar score exato (bonus)
  let scoreExact = false;
  if (pick.predictedScore) {
    const m = pick.predictedScore.match(/(\d+)\s*-\s*(\d+)/);
    if (m && parseInt(m[1]) === h && parseInt(m[2]) === a) scoreExact = true;
  }

  // Resultado global:
  // - correct: vencedor E total acertaram (ou um acertou e outro foi TOSS-UP)
  // - partial: um acertou e outro falhou
  // - wrong: ambos falharam
  // - tossup: ambos foram TOSS-UP
  let overall;
  if (winnerCorrect === null && totalCorrect === null) {
    overall = 'tossup';
  } else if ((winnerCorrect === true || winnerCorrect === null) && (totalCorrect === true || totalCorrect === null)) {
    overall = 'correct';
  } else if (winnerCorrect === false && totalCorrect === false) {
    overall = 'wrong';
  } else {
    overall = 'partial';
  }

  return {
    realScore: `${h}-${a}`,
    realWinner,
    totalGoals,
    winnerCorrect,
    totalCorrect,
    scoreExact,
    overall,
  };
}

// Procura resultados finais para todos os picks pendentes
async function autoSettlePending(picks) {
  if (!KEYS.footballdata) throw new Error("FOOTBALL_DATA_KEY em falta");
  const pending = picks.filter(p => p.result === 'pending');
  if (pending.length === 0) return { updated: 0, settled: 0, errors: [] };

  // Encontrar range de datas
  const dates = pending.map(p => new Date(p.utcDate)).filter(d => !isNaN(d));
  if (dates.length === 0) return { updated: 0, settled: 0, errors: ['datas inválidas'] };
  const minDate = new Date(Math.min(...dates));
  const maxDate = new Date(Math.max(...dates));

  // Estende range para garantir que apanha jogos terminados (jogos podem terminar dia seguinte se for à noite)
  const dateFrom = minDate.toISOString().slice(0, 10);
  const maxPlus = new Date(maxDate.getTime() + 86400000);
  const dateTo = maxPlus.toISOString().slice(0, 10);

  let finishedMatches = [];
  const errors = [];
  try {
    finishedMatches = await fdFinishedMatches(dateFrom, dateTo);
  } catch (err) {
    errors.push(`Fetch: ${err.message}`);
    return { updated: 0, settled: 0, errors };
  }

  // Mapa de gameId → resultado
  const resultMap = {};
  finishedMatches.forEach(m => {
    if (m.homeScore != null && m.awayScore != null) {
      resultMap[m.id] = m;
    }
  });

  // Atualizar picks
  let settled = 0;
  const updated = picks.map(p => {
    if (p.result !== 'pending') return p;
    const res = resultMap[p.gameId];
    if (!res) return p;
    const evalResult = evaluatePick(p, res);
    if (!evalResult) return p;
    settled++;
    return {
      ...p,
      result: evalResult.overall,
      realScore: evalResult.realScore,
      realWinner: evalResult.realWinner,
      totalGoals: evalResult.totalGoals,
      winnerCorrect: evalResult.winnerCorrect,
      totalCorrect: evalResult.totalCorrect,
      scoreExact: evalResult.scoreExact,
      settled_at: new Date().toISOString(),
    };
  });

  return { updated: updated.length, settled, errors, picks: updated };
}

// Calcula stats agregados de accuracy
function computeAccuracyStats(picks) {
  const settled = picks.filter(p => p.result !== 'pending');

  const winnerSettled = settled.filter(p => p.winnerCorrect != null);
  const winnerCorrect = winnerSettled.filter(p => p.winnerCorrect === true).length;
  const winnerAccuracy = winnerSettled.length > 0 ? winnerCorrect / winnerSettled.length : 0;

  const totalSettled = settled.filter(p => p.totalCorrect != null);
  const totalCorrect = totalSettled.filter(p => p.totalCorrect === true).length;
  const totalAccuracy = totalSettled.length > 0 ? totalCorrect / totalSettled.length : 0;

  const exactScore = settled.filter(p => p.scoreExact === true).length;

  // Breakdown por confiança
  const byConfidence = { high: { c: 0, t: 0 }, mid: { c: 0, t: 0 }, low: { c: 0, t: 0 } };
  winnerSettled.forEach(p => {
    const conf = p.winnerConfidence || 0;
    const bucket = conf >= 0.65 ? 'high' : conf >= 0.55 ? 'mid' : 'low';
    byConfidence[bucket].t++;
    if (p.winnerCorrect) byConfidence[bucket].c++;
  });

  // Breakdown por tipo de pick
  const byPickType = {};
  ['HOME', 'AWAY', 'DRAW'].forEach(t => {
    const ofType = winnerSettled.filter(p => p.winnerPick === t);
    byPickType[t] = {
      total: ofType.length,
      correct: ofType.filter(p => p.winnerCorrect).length,
      accuracy: ofType.length > 0 ? ofType.filter(p => p.winnerCorrect).length / ofType.length : 0,
    };
  });

  // Distribuição global (para donut)
  const distribution = {
    correct: picks.filter(p => p.result === 'correct').length,
    partial: picks.filter(p => p.result === 'partial').length,
    wrong: picks.filter(p => p.result === 'wrong').length,
    tossup: picks.filter(p => p.result === 'tossup').length,
    pending: picks.filter(p => p.result === 'pending').length,
  };

  return {
    total: picks.length,
    pending: picks.filter(p => p.result === 'pending').length,
    settled: settled.length,
    winnerAccuracy,
    winnerCorrect,
    winnerTotal: winnerSettled.length,
    totalAccuracy,
    totalCorrect,
    totalTotal: totalSettled.length,
    exactScore,
    byConfidence,
    byPickType,
    distribution,
  };
}

function HistoryPage() {
  const [picks, setPicks] = useState(() => loadPicks());
  const [filter, setFilter] = useState('all');

  const refresh = () => setPicks(loadPicks());

  const settle = (id, correct) => {
    const all = loadPicks();
    const idx = all.findIndex(p => p.id === id);
    if (idx === -1) return;
    all[idx] = { ...all[idx], result: correct ? 'correct' : 'wrong', settled_at: new Date().toISOString() };
    savePicks(all);
    refresh();
  };

  const remove = (id) => {
    if (!confirm('Apagar pick?')) return;
    savePicks(loadPicks().filter(p => p.id !== id));
    refresh();
  };

  const clearAll = () => {
    if (!confirm('APAGAR TODOS os picks? Esta ação é irreversível.')) return;
    savePicks([]);
    refresh();
  };

  const filtered = picks.filter(p => filter === 'all' ? true : p.result === filter);

  const settled = picks.filter(p => p.result !== 'pending');
  const correct = settled.filter(p => p.result === 'correct').length;
  const accuracy = settled.length > 0 ? correct / settled.length : 0;

  return e('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 12 } },
      e('div', null,
        e('div', { style: { fontSize: 10, letterSpacing: '0.3em', color: T.primary, fontWeight: 700 } }, 'TRACKING // ACCURACY'),
        e('div', { style: { fontSize: 24, color: T.textPrimary, fontWeight: 800, marginTop: 4 } }, 'Histórico')
      ),
      picks.length > 0 && e(Button, { onClick: clearAll, variant: 'ghost', size: 'sm' }, '🗑 LIMPAR')
    ),

    picks.length > 0 && e('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 10 } },
      e(Card, { padding: 12 },
        e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.2em', marginBottom: 4 } }, 'TOTAL'),
        e('div', { style: { fontSize: 20, fontWeight: 800, color: T.textPrimary } }, picks.length)
      ),
      e(Card, { padding: 12 },
        e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.2em', marginBottom: 4 } }, 'PENDING'),
        e('div', { style: { fontSize: 20, fontWeight: 800, color: T.warn } }, picks.filter(p => p.result === 'pending').length)
      ),
      e(Card, { padding: 12 },
        e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.2em', marginBottom: 4 } }, 'CORRECT'),
        e('div', { style: { fontSize: 20, fontWeight: 800, color: T.win } }, correct)
      ),
      e(Card, { padding: 12 },
        e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.2em', marginBottom: 4 } }, 'ACCURACY'),
        e('div', { style: { fontSize: 20, fontWeight: 800, color: accuracy >= 0.55 ? T.win : accuracy >= 0.5 ? T.warn : T.loss } }, settled.length > 0 ? fmt.pct(accuracy) : '—')
      )
    ),

    e('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
      ['all', 'pending', 'correct', 'wrong'].map(f => e('button', {
        key: f,
        onClick: () => setFilter(f),
        style: {
          padding: '6px 12px', fontSize: 10, letterSpacing: '0.15em', fontWeight: 700,
          background: filter === f ? T.primary + '20' : 'transparent',
          color: filter === f ? T.primary : T.textMuted,
          border: `1px solid ${filter === f ? T.primary + '70' : T.border}`,
          borderRadius: 4, cursor: 'pointer'
        }
      }, f.toUpperCase()))
    ),

    filtered.length === 0 ? e(Card, { padding: 32, style: { textAlign: 'center' } },
      e('div', { style: { fontSize: 36, marginBottom: 8 } }, '🎯'),
      e('div', { style: { fontSize: 12, color: T.textMuted } }, picks.length === 0 ? 'Sem picks. Analisa jogos para começar.' : 'Sem picks neste filtro.')
    ) : e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },
      filtered.map(p => {
        const winnerLabel = p.winnerPick === 'HOME' ? (p.homeTeamShort || p.homeTeam) :
          p.winnerPick === 'AWAY' ? (p.awayTeamShort || p.awayTeam) :
          p.winnerPick === 'DRAW' ? 'EMPATE' : 'TOSS-UP';
        return e(Card, {
          key: p.id,
          padding: 14,
          accent: p.result === 'correct' ? T.win + '60' : p.result === 'wrong' ? T.loss + '60' : T.warn + '60'
        },
          e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 10 } },
            e('div', { style: { flex: 1, minWidth: 200 } },
              e('div', { style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 6, flexWrap: 'wrap' } },
                e(Badge, {
                  color: p.result === 'correct' ? 'win' : p.result === 'wrong' ? 'loss' : 'warn'
                }, p.result === 'correct' ? '✓ CORRECT' : p.result === 'wrong' ? '✗ WRONG' : '⏱ PENDING'),
                p.matchday && e(Badge, { color: 'secondary' }, `J${p.matchday}`),
                e('span', { style: { fontSize: 10, color: T.textMuted } }, fmt.dateTime(p.utcDate))
              ),
              e('div', { style: { fontSize: 14, color: T.textPrimary, fontWeight: 700, marginBottom: 6 } },
                `${p.homeTeamShort || p.homeTeam} vs ${p.awayTeamShort || p.awayTeam}`
              ),
              e('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 8 } },
                e('div', null,
                  e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.15em' } }, '🎯 PICK'),
                  e('div', { style: { fontSize: 12, color: T.primary, fontWeight: 700 } }, winnerLabel),
                  e('div', { style: { fontSize: 10, color: T.textMuted } }, fmt.pct(p.winnerConfidence) + ' conf')
                ),
                p.totalPick && e('div', null,
                  e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.15em' } }, '⚽ TOTAL'),
                  e('div', { style: { fontSize: 12, color: T.primary, fontWeight: 700 } }, p.totalPick),
                  e('div', { style: { fontSize: 10, color: T.textMuted } }, fmt.pct(p.totalConfidence) + ' conf')
                ),
                p.predictedScore && e('div', null,
                  e('div', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.15em' } }, '📍 SCORE'),
                  e('div', { style: { fontSize: 12, color: T.textPrimary, fontWeight: 700 } }, p.predictedScore)
                )
              )
            ),
            e('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
              p.result === 'pending' ? e('div', { style: { display: 'flex', gap: 4 } },
                e(Button, { onClick: () => settle(p.id, true), variant: 'primary', size: 'sm' }, '✓'),
                e(Button, { onClick: () => settle(p.id, false), variant: 'ghost', size: 'sm', style: { background: T.loss, color: '#fff' } }, '✗')
              ) : e(Button, { onClick: () => remove(p.id), variant: 'ghost', size: 'sm' }, '×')
            )
          ),
          p.reasoning && e('details', { style: { marginTop: 10, paddingTop: 10, borderTop: `1px solid ${T.border}80` } },
            e('summary', { style: { fontSize: 9, color: T.textMuted, letterSpacing: '0.15em' } }, '💭 RACIOCÍNIO IA ▾'),
            e('div', { style: { fontSize: 11, color: T.textSecondary, marginTop: 8, lineHeight: 1.5, fontStyle: 'italic' } }, p.reasoning)
          )
        );
      })
    )
  );
}

// =============================================================
// APP PRINCIPAL
// =============================================================
function App() {
  const [activePage, setActivePage] = useState('picks');
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [, setRefresh] = useState(0);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  }, []);

  return e('div', { style: { minHeight: '100vh', background: T.bg } },
    // Background grid
    e('div', {
      style: {
        position: 'fixed', inset: 0, opacity: 0.025, pointerEvents: 'none', zIndex: 0,
        backgroundImage: `linear-gradient(${T.textPrimary} 1px, transparent 1px), linear-gradient(90deg, ${T.textPrimary} 1px, transparent 1px)`,
        backgroundSize: '40px 40px'
      }
    }),

    // HEADER
    e('div', {
      style: {
        position: 'sticky', top: 0, zIndex: 50,
        background: 'rgba(10,10,15,0.92)',
        backdropFilter: 'blur(8px)',
        borderBottom: `1px solid ${T.border}`,
      }
    },
      e('div', { style: { maxWidth: 1100, margin: '0 auto', padding: '14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
          e('div', { style: { fontSize: 26, animation: 'pulse 2s ease-in-out infinite' } }, '⚽'),
          e('div', null,
            e('div', { style: { fontSize: 9, letterSpacing: '0.35em', color: T.primary, fontWeight: 700 } }, 'AI // PICKS // PREMIER'),
            e('div', { style: { fontSize: 16, color: T.textPrimary, fontWeight: 800, marginTop: 2 } },
              'Premier Picks', e('span', { style: { color: T.primary } }, '_')
            )
          )
        ),
        e('div', { style: { display: 'flex', gap: 4, alignItems: 'center' } },
          e('button', {
            onClick: () => setActivePage('picks'),
            style: {
              background: activePage === 'picks' ? T.primary + '20' : 'transparent',
              border: `1px solid ${activePage === 'picks' ? T.primary + '60' : 'transparent'}`,
              color: activePage === 'picks' ? T.primary : T.textMuted,
              padding: '7px 12px', fontSize: 10, letterSpacing: '0.18em', fontWeight: 700,
              cursor: 'pointer', borderRadius: 4
            }
          }, 'PICKS'),
          e('button', {
            onClick: () => setActivePage('results'),
            style: {
              background: activePage === 'results' ? T.primary + '20' : 'transparent',
              border: `1px solid ${activePage === 'results' ? T.primary + '60' : 'transparent'}`,
              color: activePage === 'results' ? T.primary : T.textMuted,
              padding: '7px 12px', fontSize: 10, letterSpacing: '0.18em', fontWeight: 700,
              cursor: 'pointer', borderRadius: 4
            }
          }, '📊 RESULTADOS'),
          e('button', {
            onClick: () => setActivePage('history'),
            style: {
              background: activePage === 'history' ? T.primary + '20' : 'transparent',
              border: `1px solid ${activePage === 'history' ? T.primary + '60' : 'transparent'}`,
              color: activePage === 'history' ? T.primary : T.textMuted,
              padding: '7px 12px', fontSize: 10, letterSpacing: '0.18em', fontWeight: 700,
              cursor: 'pointer', borderRadius: 4
            }
          }, 'HISTÓRICO'),
          e('button', {
            onClick: () => setSettingsOpen(true),
            style: { background: 'transparent', border: `1px solid ${T.border}`, color: T.textMuted, padding: '7px 11px', fontSize: 13, cursor: 'pointer', borderRadius: 4 },
            title: 'Definições'
          }, '⚙')
        )
      )
    ),

    // CONTENT
    e('div', { style: { maxWidth: 1100, margin: '0 auto', padding: '20px 16px', position: 'relative' } },
      activePage === 'picks' && e(PicksPage),
      activePage === 'results' && e(ResultsPage),
      activePage === 'history' && e(HistoryPage)
    ),

    // FOOTER
    e('div', { style: { borderTop: `1px solid ${T.border}`, marginTop: 40, padding: '16px', textAlign: 'center', fontSize: 9, color: T.textDim, letterSpacing: '0.15em' } },
      'PREDIÇÕES PARA ANÁLISE PESSOAL // NÃO É CONSELHO DE APOSTA // SEM GARANTIAS DE LUCRO'
    ),

    e(SettingsPanel, { open: settingsOpen, onClose: () => setSettingsOpen(false), onSaved: () => setRefresh(r => r + 1) })
  );
}

// =============================================================
// MOUNT
// =============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));

</script>
</body>
</html>
